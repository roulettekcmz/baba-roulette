<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>FÜR BABA → Roulette Analyse System</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:Arial;
background:#f4f7fa;
padding:30px;
}
h1{text-align:center;}
.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
}
select,input{
padding:8px;
margin:5px;
}
button{
padding:8px 14px;
background:#1976d2;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}
button:hover{
background:#125aa0;
}
.message{
color:#c62828;
font-weight:bold;
margin-top:10px;
}
</style>
</head>

<body>

<h1>FÜR BABA → Roulette Analyse System</h1>

<div class="card">
<label>Tisch:</label>
<select id="tisch"></select>

<label>Auswertung:</label>
<select id="modus">
<option value="tag">Einzelner Tag</option>
<option value="monat">Ganzer Monat</option>
<option value="jahr">Ganzes Jahr</option>
<option value="zeitraum">Zeitraum wählen</option>
</select>
<br>

<label>Jahr:</label>
<select id="jahr"></select>

<label>Monat:</label>
<select id="monat"></select>

<label>Tag:</label>
<select id="tag"></select>

<br>

<label>Von:</label>
<input type="date" id="von">
<label>Bis:</label>
<input type="date" id="bis">

<br><br>
<button onclick="auswerten()">Auswerten</button>
</div>

<div class="card" id="ergebnis"></div>

<script>

let daten={};

fetch("datenbank.json")
.then(res=>res.json())
.then(json=>{
daten=json;
init();
});

function init(){

// Zeitraum fest definieren
document.getElementById("von").min="2020-01-01";
document.getElementById("von").max="2026-02-28";
document.getElementById("bis").min="2020-01-01";
document.getElementById("bis").max="2026-02-28";

// Jahre füllen
let jahrSelect=document.getElementById("jahr");
jahrSelect.innerHTML="<option value=''>Wählen</option>";

for(let j=2020;j<=2026;j++){
jahrSelect.innerHTML+=`<option value="${j}">${j}</option>`;
}

// Tische sammeln
let tischeSet=new Set();
Object.values(daten).forEach(jahr=>{
Object.keys(jahr).forEach(t=>tischeSet.add(t));
});

let tischSelect=document.getElementById("tisch");
tischSelect.innerHTML="<option value=''>Wählen</option>";
tischeSet.forEach(t=>{
tischSelect.innerHTML+=`<option value="${t}">${t}</option>`;
});
}

document.getElementById("jahr").onchange=function(){
let jahr=this.value;
let monatSelect=document.getElementById("monat");
monatSelect.innerHTML="<option value=''>Wählen</option>";

for(let m=1;m<=12;m++){
let mm=m.toString().padStart(2,"0");
monatSelect.innerHTML+=`<option value="${mm}">${mm}</option>`;
}
};

document.getElementById("monat").onchange=function(){
let tagSelect=document.getElementById("tag");
tagSelect.innerHTML="<option value=''>Wählen</option>";

for(let t=1;t<=31;t++){
let tt=t.toString().padStart(2,"0");
tagSelect.innerHTML+=`<option value="${tt}">${tt}</option>`;
}
};

function auswerten(){

let tisch=document.getElementById("tisch").value;
let modus=document.getElementById("modus").value;
let jahr=document.getElementById("jahr").value;
let monat=document.getElementById("monat").value;
let tag=document.getElementById("tag").value;

let zahlen=[];

if(!tisch){
zeige("Bitte Tisch auswählen.");
return;
}

if(modus==="tag"){
if(!daten[jahr]||!daten[jahr][tisch]||!daten[jahr][tisch][monat]||!daten[jahr][tisch][monat][tag]){
zeige("Keine Permanenzen an diesem Tag.");
return;
}
zahlen=daten[jahr][tisch][monat][tag];
}

if(modus==="monat"){
if(!daten[jahr]||!daten[jahr][tisch]||!daten[jahr][tisch][monat]){
zeige("Keine Daten vorhanden.");
return;
}
Object.values(daten[jahr][tisch][monat]).forEach(arr=>{
zahlen=zahlen.concat(arr);
});
}

if(modus==="jahr"){
if(!daten[jahr]||!daten[jahr][tisch]){
zeige("Keine Daten vorhanden.");
return;
}
Object.values(daten[jahr][tisch]).forEach(monatObj=>{
Object.values(monatObj).forEach(arr=>{
zahlen=zahlen.concat(arr);
});
});
}

if(modus==="zeitraum"){
let von=new Date(document.getElementById("von").value);
let bis=new Date(document.getElementById("bis").value);

if(!von||!bis){zeige("Zeitraum auswählen.");return;}

for(let j=2020;j<=2026;j++){
if(!daten[j]||!daten[j][tisch])continue;

Object.keys(daten[j][tisch]).forEach(m=>{
Object.keys(daten[j][tisch][m]).forEach(t=>{
let datum=new Date(j+"-"+m+"-"+t);
if(datum>=von && datum<=bis){
zahlen=zahlen.concat(daten[j][tisch][m][t]);
}
});
});
}
}

if(zahlen.length===0){
zeige("Keine Permanenzen gefunden.");
return;
}

// 60er Block
let blocks=Math.ceil(zahlen.length/60);

zeige(
"Gesamt Zahlen: "+zahlen.length+
"<br>60er Blöcke: "+blocks
);
}

function zeige(text){
document.getElementById("ergebnis").innerHTML="<div class='message'>"+text+"</div>";
}

</script>

</body>
</html>
