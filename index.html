<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>FÜR BABA → Roulette Analyse System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:Arial, sans-serif;
background:#f4f7fa;
margin:0;
padding:30px;
}

h1{
text-align:center;
margin-bottom:30px;
}

.container{
max-width:1300px;
margin:auto;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

select{
padding:10px;
margin-right:15px;
margin-bottom:10px;
font-size:15px;
}

.block{
background:#e3f2fd;
padding:12px;
margin:8px 0;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.block:hover{
background:#bbdefb;
}

.message{
font-weight:bold;
color:#c62828;
margin-top:15px;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

.modal-content{
background:white;
margin:5% auto;
padding:20px;
width:85%;
max-height:85%;
overflow:auto;
border-radius:10px;
}

.closeBtn{
background:#c62828;
color:white;
padding:8px 12px;
border:none;
border-radius:5px;
cursor:pointer;
}
</style>
</head>

<body>

<h1>FÜR BABA → Roulette Analyse System</h1>

<div class="container">

<div class="card">
<label>Tisch:</label>
<select id="tisch"></select>

<label>Jahr:</label>
<select id="jahr"></select>

<label>Monat:</label>
<select id="monat"></select>

<label>Tag:</label>
<select id="tag"></select>
</div>

<div class="card" id="übersicht"></div>

<div class="card" id="blockAnzeige"></div>

</div>

<div class="modal" id="detailModal">
<div class="modal-content">
<button class="closeBtn" onclick="closeModal()">Schließen</button>
<div id="detailInhalt"></div>
</div>
</div>

<script>

let daten = {};

fetch("datenbank.json")
.then(res=>res.json())
.then(json=>{
daten=json;
initJahre();
});

function initJahre(){
let jahrSelect=document.getElementById("jahr");
jahrSelect.innerHTML="<option value=''>Wählen</option>";

Object.keys(daten).sort().forEach(j=>{
jahrSelect.innerHTML+=`<option value="${j}">${j}</option>`;
});
}

document.getElementById("jahr").onchange=function(){
updateTische();
};

document.getElementById("tisch").onchange=function(){
updateMonate();
};

document.getElementById("monat").onchange=function(){
updateTage();
};

document.getElementById("tag").onchange=function(){
anzeigen();
};

function updateTische(){
let jahr=document.getElementById("jahr").value;
let tischSelect=document.getElementById("tisch");
tischSelect.innerHTML="<option value=''>Wählen</option>";

if(!daten[jahr]){
zeigeMeldung("Noch keine Daten vorhanden.");
return;
}

Object.keys(daten[jahr]).forEach(t=>{
tischSelect.innerHTML+=`<option value="${t}">${t}</option>`;
});
}

function updateMonate(){
let jahr=document.getElementById("jahr").value;
let tisch=document.getElementById("tisch").value;
let monatSelect=document.getElementById("monat");
monatSelect.innerHTML="<option value=''>Wählen</option>";

if(!daten[jahr]||!daten[jahr][tisch]) return;

Object.keys(daten[jahr][tisch]).sort().forEach(m=>{
monatSelect.innerHTML+=`<option value="${m}">${m}</option>`;
});
}

function updateTage(){
let jahr=document.getElementById("jahr").value;
let tisch=document.getElementById("tisch").value;
let monat=document.getElementById("monat").value;
let tagSelect=document.getElementById("tag");
tagSelect.innerHTML="<option value=''>Wählen</option>";

if(!daten[jahr]||!daten[jahr][tisch]||!daten[jahr][tisch][monat]) return;

Object.keys(daten[jahr][tisch][monat]).sort().forEach(t=>{
tagSelect.innerHTML+=`<option value="${t}">${t}</option>`;
});
}

function anzeigen(){

let jahr=document.getElementById("jahr").value;
let tisch=document.getElementById("tisch").value;
let monat=document.getElementById("monat").value;
let tag=document.getElementById("tag").value;

let ausgabe=document.getElementById("übersicht");
let blockDiv=document.getElementById("blockAnzeige");

blockDiv.innerHTML="";

if(!daten[jahr]||!daten[jahr][tisch]||!daten[jahr][tisch][monat]||!daten[jahr][tisch][monat][tag]){
zeigeMeldung("Keine Permanenzen an diesem Tag.");
return;
}

let zahlen=daten[jahr][tisch][monat][tag];

if(zahlen.length===0){
zeigeMeldung("Keine Permanenzen an diesem Tag.");
return;
}

let blocks=Math.ceil(zahlen.length/60);

ausgabe.innerHTML=
"<b>Gesamt Zahlen:</b> "+zahlen.length+
"<br><b>Anzahl Blöcke (60 Zahlen):</b> "+blocks;

for(let i=0;i<blocks;i++){
let blockNr=i+1;
blockDiv.innerHTML+=`
<div class="block" onclick="zeigeDetail('${jahr}','${tisch}','${monat}','${tag}',${blockNr})">
Block ${blockNr}
</div>
`;
}
}

function zeigeDetail(jahr,tisch,monat,tag,blockNr){

let zahlen=daten[jahr][tisch][monat][tag];
let start=(blockNr-1)*60;
let block=zahlen.slice(start,start+60);

let einsatz=block.length;
let treffer=0;

block.forEach(z=>{
if(z===0) treffer++;
});

let gewinn=treffer*36-einsatz;

document.getElementById("detailInhalt").innerHTML=
"<h2>Block "+blockNr+"</h2>"+
"<b>Einsatz:</b> "+einsatz+" E<br>"+
"<b>Treffer:</b> "+treffer+"<br>"+
"<b>Gewinn / Verlust:</b> "+gewinn+" E<br><br>"+
"<canvas id='chart'></canvas>";

document.getElementById("detailModal").style.display="block";

new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:["Einsatz","Gewinn"],
datasets:[{
data:[einsatz,gewinn]
}]
}
});
}

function closeModal(){
document.getElementById("detailModal").style.display="none";
}

function zeigeMeldung(text){
document.getElementById("übersicht").innerHTML=
"<div class='message'>"+text+"</div>";
}

</script>

</body>
</html>
