<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>FÜR BABA -> Roulette Analyse Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body {font-family: Arial; margin:20px; background:#f2f4f8;}
h1 {text-align:center;}
textarea {width:100%; height:150px; font-size:14px;}
button {width:100%; padding:15px; font-size:18px; background:#1e88e5; color:white; border:none; margin-top:10px; cursor:pointer;}
.dashboard {display:flex; gap:20px; margin-top:20px; flex-wrap:wrap;}
.card {flex:1; background:white; padding:20px; border-radius:10px; box-shadow:0 3px 10px rgba(0,0,0,0.1); text-align:center;}
.card h2 {margin:0; font-size:18px; color:#555;}
.card p {font-size:26px; margin:5px 0 0 0;}
.blocks {display:flex; flex-wrap:wrap; gap:10px; margin-top:20px;}
.block {padding:15px; border-radius:8px; color:white; cursor:pointer; width:120px; text-align:center;}
.green {background:#4caf50;}
.yellow {background:#ff9800;}
.red {background:#f44336;}
.details {display:none; background:white; padding:15px; margin-top:10px; border-radius:8px;}
canvas {margin-top:30px; background:white; padding:20px; border-radius:10px;}
</style>
</head>
<body>

<h1>FÜR BABA -> Roulette Analyse Dashboard</h1>

<textarea id="input" placeholder='Beispiel:
Permanenzen: "Touch Bet Autom.Sp.2 vom 02.02.2026"
28 19 15 20 33 2 7 11 25 30 14 ...'></textarea>

<button onclick="analyse()">Analyse starten</button>

<div id="dashboard"></div>
<canvas id="capitalChart"></canvas>
<div id="blockContainer"></div>

<script>

function analyse(){

const text = document.getElementById("input").value;
const numbers = text.match(/\b\d+\b/g)?.map(Number) || [];

if(numbers.length===0){alert("Keine Zahlen gefunden!"); return;}

const dateMatch = text.match(/\d{2}\.\d{2}\.\d{4}/);
const date = dateMatch ? dateMatch[0] : "Unbekannt";

const tableMatch = text.match(/Touch Bet[^"]+/);
const tableName = tableMatch ? tableMatch[0] : "Unbekannter Tisch";

const blockSize = 12;
let blocks = [];
for(let i=0;i<numbers.length;i+=blockSize){
blocks.push(numbers.slice(i,i+blockSize));
}

let capital = 0;
let capitalHistory = [];
let bestBlock = 0;
let worstBlock = 0;
let bestValue = -999;
let worstValue = 999;

blocks.forEach((block,index)=>{
let hits = block.length; // jede Zahl zählt als Versuch
let successRate = (hits / 12) * 100;
let profit = hits - 6; // einfache Gewinnformel
capital += profit;
capitalHistory.push(capital);

blocks[index].success = successRate.toFixed(1);
blocks[index].profit = profit;

if(successRate > bestValue){bestValue = successRate; bestBlock = index+1;}
if(successRate < worstValue){worstValue = successRate; worstBlock = index+1;}
});

const totalSuccess = (blocks.reduce((a,b)=>a+parseFloat(b.success),0)/blocks.length).toFixed(1);

document.getElementById("dashboard").innerHTML = `
<div class="dashboard">
<div class="card"><h2>Spieltag</h2><p>${date}</p></div>
<div class="card"><h2>Tisch</h2><p>${tableName}</p></div>
<div class="card"><h2>Blöcke</h2><p>${blocks.length}</p></div>
<div class="card"><h2>Gesamt Erfolg</h2><p>${totalSuccess}%</p></div>
<div class="card"><h2>Bester Block</h2><p>#${bestBlock}</p></div>
<div class="card"><h2>Schlechtester Block</h2><p>#${worstBlock}</p></div>
</div>
`;

const ctx = document.getElementById("capitalChart").getContext("2d");
new Chart(ctx,{
type:"line",
data:{
labels: blocks.map((_,i)=>"Block "+(i+1)),
datasets:[{
label:"Kapitalentwicklung",
data: capitalHistory,
fill:false,
borderColor:"#1e88e5",
tension:0.1
}]
},
options:{
responsive:true,
plugins:{legend:{position:"bottom"}}
}
});

let blockHTML = `<div class="blocks">`;
blocks.forEach((b,i)=>{
let colorClass = "green";
if(b.success < 50) colorClass="red";
else if(b.success < 65) colorClass="yellow";

blockHTML += `
<div class="block ${colorClass}" onclick="toggleDetails(${i})">
Block ${i+1}<br>${b.success}%
</div>
<div id="details${i}" class="details">
<h3>Block ${i+1}</h3>
<p>Zahlen: ${b.join(", ")}</p>
<p>Gewinn/Verlust: ${b.profit}</p>
<p>Erfolg: ${b.success}%</p>
</div>
`;
});
blockHTML += `</div>`;
document.getElementById("blockContainer").innerHTML = blockHTML;

}

function toggleDetails(i){
const el = document.getElementById("details"+i);
el.style.display = el.style.display==="block" ? "none" : "block";
}

</script>

</body>
</html>
