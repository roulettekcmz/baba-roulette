<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>FÜR BABA → Roulette Analyse Tool</title>

<style>
body{
font-family: Arial, sans-serif;
background:#f4f6f9;
margin:0;
padding:20px;
color:#222;
}

h1{
text-align:center;
}

.container{
max-width:1200px;
margin:auto;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

select,button{
padding:10px;
margin:5px 0;
font-size:16px;
}

button{
background:#1976d2;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#125aa0;
}

.block{
background:#e3f2fd;
padding:10px;
margin:5px 0;
border-radius:6px;
cursor:pointer;
}

.block:hover{
background:#bbdefb;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
}

.modal-content{
background:white;
margin:5% auto;
padding:20px;
width:80%;
max-height:80%;
overflow:auto;
border-radius:10px;
}

canvas{
max-width:300px;
max-height:200px;
}
</style>
</head>

<body>

<h1>FÜR BABA → Roulette Analyse Tool</h1>

<div class="container">

<div class="card">
<textarea id="inputData" rows="8" style="width:100%;" placeholder="Hier komplette Monatsdaten einfügen..."></textarea>
<br>
<button onclick="verarbeiten()">Daten analysieren</button>
</div>

<div class="card">
<select id="jahrSelect" onchange="updateMonate()"></select>
<select id="monatSelect" onchange="updateTage()"></select>
<select id="tagSelect" onchange="zeigeBloecke()"></select>
</div>

<div class="card" id="blockAnzeige"></div>

</div>

<div class="modal" id="detailModal">
<div class="modal-content">
<button onclick="closeModal()">Schließen</button>
<div id="detailInhalt"></div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

let datenStruktur={};

function verarbeiten(){

datenStruktur={};

let text=document.getElementById("inputData").value;

let tage=text.split("Permanenzen:");

tage.forEach(t=>{
if(t.includes("vom")){
let datum=t.match(/\d{2}\.\d{2}\.\d{4}/);
if(!datum)return;

let d=datum[0];
let [tag,monat,jahr]=d.split(".");

if(!datenStruktur[jahr])datenStruktur[jahr]={};
if(!datenStruktur[jahr][monat])datenStruktur[jahr][monat]={};

let zahlen=t.match(/\b\d+\b/g);
if(!zahlen)return;

zahlen=zahlen.map(z=>parseInt(z)).filter(z=>z<=36);

datenStruktur[jahr][monat][tag]=zahlen;
}
});

updateJahre();
alert("Daten erfolgreich eingelesen");
}

function updateJahre(){
let jahrSelect=document.getElementById("jahrSelect");
jahrSelect.innerHTML="<option>Jahr wählen</option>";

Object.keys(datenStruktur).forEach(j=>{
jahrSelect.innerHTML+=`<option value="${j}">${j}</option>`;
});
}

function updateMonate(){
let jahr=document.getElementById("jahrSelect").value;
let monatSelect=document.getElementById("monatSelect");
monatSelect.innerHTML="<option>Monat wählen</option>";

if(!datenStruktur[jahr])return;

Object.keys(datenStruktur[jahr]).forEach(m=>{
monatSelect.innerHTML+=`<option value="${m}">${m}</option>`;
});
}

function updateTage(){
let jahr=document.getElementById("jahrSelect").value;
let monat=document.getElementById("monatSelect").value;
let tagSelect=document.getElementById("tagSelect");
tagSelect.innerHTML="<option>Tag wählen</option>";

if(!datenStruktur[jahr]||!datenStruktur[jahr][monat])return;

Object.keys(datenStruktur[jahr][monat]).forEach(t=>{
tagSelect.innerHTML+=`<option value="${t}">${t}.${monat}.${jahr}</option>`;
});
}

function zeigeBloecke(){
let jahr=document.getElementById("jahrSelect").value;
let monat=document.getElementById("monatSelect").value;
let tag=document.getElementById("tagSelect").value;

let zahlen=datenStruktur[jahr][monat][tag];
let blockDiv=document.getElementById("blockAnzeige");
blockDiv.innerHTML="";

for(let i=0;i<zahlen.length;i+=60){
let block=zahlen.slice(i,i+60);
let blockNr=(i/60)+1;

blockDiv.innerHTML+=`
<div class="block" onclick="zeigeDetail('${jahr}','${monat}','${tag}',${blockNr})">
Block ${blockNr} (60 Zahlen)
</div>
`;
}
}

function zeigeDetail(jahr,monat,tag,blockNr){

let zahlen=datenStruktur[jahr][monat][tag];
let start=(blockNr-1)*60;
let block=zahlen.slice(start,start+60);

let gesEinsatz=block.length;
let gewinn=0;

block.forEach(z=>{
if(z===0)gewinn-=1;
});

let html=`
<h2>Detail Block ${blockNr}</h2>
<p>Gesamt Zahlen: ${block.length}</p>
<p>Einsatz: ${gesEinsatz} E</p>
<p>Gewinn/Verlust: ${gewinn} E</p>
<canvas id="chart"></canvas>
`;

document.getElementById("detailInhalt").innerHTML=html;
document.getElementById("detailModal").style.display="block";

new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:["Einsatz","Gewinn"],
datasets:[{
data:[gesEinsatz,gewinn]
}]
}
});
}

function closeModal(){
document.getElementById("detailModal").style.display="none";
}

</script>

</body>
</html>
