<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>FÜR BABA → Roulette Analyse Tool</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{
font-family:Arial;
background:#0e1117;
color:white;
padding:20px;
}
h1{text-align:center;color:#4da6ff;}
textarea{
width:100%;
height:160px;
font-size:15px;
padding:10px;
border-radius:10px;
}
button{
padding:12px 20px;
font-size:16px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
background:#4da6ff;
color:black;
font-weight:bold;
}
button:hover{background:#3399ff;}
.card{
background:#1b1f27;
padding:15px;
margin-top:15px;
border-radius:10px;
cursor:pointer;
}
.smallChart{
width:300px;
height:200px;
background:white;
border-radius:10px;
margin-top:10px;
}
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
overflow:auto;
padding:40px;
}
.modal-content{
background:#1b1f27;
padding:20px;
border-radius:15px;
}
.close{
font-size:22px;
cursor:pointer;
float:right;
}
</style>
</head>
<body>

<h1>🎰 FÜR BABA → Roulette Analyse Tool</h1>

<textarea id="input" placeholder="Spieltag einfügen (mit Datum)..."></textarea><br>
<button onclick="analyse()">Analysieren</button>
<button onclick="resetAll()">Alles löschen</button>

<div id="overview"></div>

<div id="modal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">❌</span>
<div id="modalContent"></div>
</div>
</div>

<script>

let globalStats={
totalEinsatz:0,
totalGewinn:0,
totalTreffer:0,
totalNicht:0
};

function finalOf(n){ if(n===0)return 0; return n%10; }

function analyse(){

let raw=document.getElementById("input").value;
let zahlen=raw.match(/\b([0-9]|[12][0-9]|3[0-6])\b/g);
if(!zahlen){alert("Keine Zahlen erkannt");return;}
zahlen=zahlen.map(Number);

let overview=document.getElementById("overview");
overview.innerHTML="";

let blockNr=0;
let tagEinsatz=0;
let tagGewinn=0;
let tagTreffer=0;
let tagNicht=0;

for(let start=0;start<zahlen.length;start+=60){

blockNr++;
let block=zahlen.slice(start,start+60);
if(block.length<20)break;

let analyseIndex=20;
let finale=[];

while(true){

let beobachtung=block.slice(0,analyseIndex);
let count={};

beobachtung.forEach(n=>{
let f=finalOf(n);
if(f!==0){ count[f]=(count[f]||0)+1; }
});

finale=Object.keys(count).filter(f=>count[f]>=3);

if(finale.length>=3)break;

analyseIndex+=12;
if(analyseIndex>=block.length)break;
}

if(finale.length<3)continue;

let aktiveZahlen=[];
finale.forEach(f=>{
for(let i=0;i<=36;i++){
if(finalOf(i)==f && i!=0)aktiveZahlen.push(i);
}
});

let runde=1;
let einsatzProZahl=1;
let blockEinsatz=0;
let blockGewinn=0;
let blockTreffer=0;
let blockNicht=0;

let details="";

for(let i=analyseIndex;i<block.length;i++){

if(aktiveZahlen.length===0)break;

if(runde>=3)einsatzProZahl=2;

let zahl=block[i];

let rundenEinsatz=aktiveZahlen.length*einsatzProZahl;
blockEinsatz+=rundenEinsatz;

if(aktiveZahlen.includes(zahl)){
blockTreffer++;
blockGewinn+=36*einsatzProZahl;
aktiveZahlen=aktiveZahlen.filter(z=>z!=zahl);
details+="Runde "+runde+" → "+zahl+" TREFFER | Einsatz "+rundenEinsatz+"E\n";
}else{
blockNicht++;
details+="Runde "+runde+" → "+zahl+" Kein Treffer | Einsatz "+rundenEinsatz+"E\n";
}

blockGewinn-=rundenEinsatz;
runde++;
}

let netto=blockGewinn;
let quote=((blockTreffer/(blockTreffer+blockNicht))*100 || 0).toFixed(2);

tagEinsatz+=blockEinsatz;
tagGewinn+=netto;
tagTreffer+=blockTreffer;
tagNicht+=blockNicht;

globalStats.totalEinsatz+=blockEinsatz;
globalStats.totalGewinn+=netto;
globalStats.totalTreffer+=blockTreffer;
globalStats.totalNicht+=blockNicht;

let card=document.createElement("div");
card.className="card";
card.innerHTML="<b>Block "+blockNr+"</b><br>"+
"Trefferquote: "+quote+"%<br>"+
"Einsatz: "+blockEinsatz+"E<br>"+
"Gewinn: "+netto+"E";

card.onclick=function(){
openModal(
"<h2>Block "+blockNr+"</h2>"+
"<b>Analyse Zahlen:</b><br>"+block.slice(0,analyseIndex).join(", ")+"<br><br>"+
"<b>Gespielt ab Zahl:</b> "+analyseIndex+"<br><br>"+
"<b>Einsatz gesamt:</b> "+blockEinsatz+"E<br>"+
"<b>Gewinn:</b> "+netto+"E<br>"+
"<b>Treffer:</b> "+blockTreffer+"<br>"+
"<b>Nicht Treffer:</b> "+blockNicht+"<br>"+
"<pre>"+details+"</pre>"
);
};

overview.appendChild(card);

createChart(blockNr,blockEinsatz,netto);

}

let tagQuote=((tagTreffer/(tagTreffer+tagNicht))*100 || 0).toFixed(2);

let summary=document.createElement("div");
summary.className="card";
summary.innerHTML="<h2>Spieltag Gesamt</h2>"+
"Trefferquote: "+tagQuote+"%<br>"+
"Einsatz Gesamt: "+tagEinsatz+"E<br>"+
"Gewinn Gesamt: "+tagGewinn+"E";

overview.prepend(summary);

}

function createChart(nr,einsatz,gewinn){

let canvas=document.createElement("canvas");
canvas.className="smallChart";
document.getElementById("overview").appendChild(canvas);

new Chart(canvas,{
type:'bar',
data:{
labels:['E gespielt','E Gewinn'],
datasets:[{data:[einsatz,gewinn]}]
},
options:{plugins:{legend:{display:false}}}
});
}

function openModal(text){
document.getElementById("modalContent").innerHTML=text;
document.getElementById("modal").style.display="block";
}
function closeModal(){
document.getElementById("modal").style.display="none";
}
function resetAll(){
document.getElementById("input").value="";
document.getElementById("overview").innerHTML="";
globalStats={totalEinsatz:0,totalGewinn:0,totalTreffer:0,totalNicht:0};
}

</script>
</body>
</html>
