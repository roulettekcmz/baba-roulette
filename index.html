<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>FÜR BABA → Roulette Analyse Tool</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{
font-family:Arial;
background:#0e1117;
color:white;
padding:20px;
}

h1{
text-align:center;
color:#4da6ff;
}

textarea{
width:100%;
height:180px;
font-size:16px;
padding:10px;
border-radius:10px;
}

button{
padding:15px;
font-size:18px;
margin:10px 5px;
border:none;
border-radius:10px;
cursor:pointer;
background:#4da6ff;
color:black;
font-weight:bold;
}

button:hover{
background:#3399ff;
}

.block{
background:#1b1f27;
padding:15px;
margin-top:15px;
border-radius:10px;
cursor:pointer;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
overflow:auto;
padding:40px;
}

.modal-content{
background:#1b1f27;
padding:20px;
border-radius:15px;
}

.close{
font-size:25px;
cursor:pointer;
float:right;
}

canvas{
background:white;
border-radius:10px;
margin-top:20px;
}
</style>
</head>
<body>

<h1>🎰 FÜR BABA → Roulette Analyse Tool</h1>

<textarea id="input" placeholder="Hier Permanenzen einfügen..."></textarea>
<br>
<button onclick="analysieren()">Analysieren</button>
<button onclick="resetAll()">Alles löschen</button>

<div id="ergebnis"></div>

<div id="modal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">❌ Schließen</span>
<div id="modalText"></div>
</div>
</div>

<script>

function finalOf(n){
if(n===0)return 0;
return n%10;
}

function analysieren(){

let raw=document.getElementById("input").value;
let zahlen=raw.match(/\b([0-9]|[12][0-9]|3[0-6])\b/g);
if(!zahlen){alert("Keine Zahlen erkannt");return;}
zahlen=zahlen.map(Number);

let ergebnisDiv=document.getElementById("ergebnis");
ergebnisDiv.innerHTML="";

let blockNr=0;

for(let start=0;start<zahlen.length;start+=60){

blockNr++;

let blockZahlen=zahlen.slice(start,start+60);
if(blockZahlen.length<20)break;

let beobachtung=blockZahlen.slice(0,20);
let countFinal={};
beobachtung.forEach(n=>{
let f=finalOf(n);
if(f!==0){
countFinal[f]=(countFinal[f]||0)+1;
}
});

let offeneFinale=Object.keys(countFinal).filter(f=>countFinal[f]>=3);

if(offeneFinale.length<3)continue;

let spielZahlen=blockZahlen.slice(20,32);
let runde=1;
let einsatzPlan=[1,1,2];
let gesamtEinsatz=0;
let gesamtTreffer=0;
let gesamtNicht=0;
let gewinn=0;

let details="";

spielZahlen.forEach((zahl,index)=>{
let f=finalOf(zahl);
let einsatz=einsatzPlan[Math.min(runde-1,2)];
let wetten=offeneFinale.length;

gesamtEinsatz+=einsatz*wetten;

if(offeneFinale.includes(String(f))){
gesamtTreffer++;
gewinn+=einsatz*9 - (einsatz*(wetten-1));
details+="Runde "+runde+": Zahl "+zahl+" → TREFFER | Einsatz "+einsatz+" pro Finale\n";
offeneFinale=openeneNachTreffer(offeneFinale,f);
}else{
gesamtNicht++;
gewinn-=einsatz*wetten;
details+="Runde "+runde+": Zahl "+zahl+" → Nicht getroffen | Einsatz "+einsatz+" pro Finale\n";
}

runde++;
});

let quote=((gesamtTreffer/(gesamtTreffer+gesamtNicht))*100).toFixed(2);

let blockDiv=document.createElement("div");
blockDiv.className="block";
blockDiv.innerHTML="📦 Block "+blockNr+"<br>Trefferquote: "+quote+"%<br>Gewinn: "+gewinn+" Stücke";
blockDiv.onclick=function(){
openModal("BLOCK "+blockNr+
"<br><br>Beobachtete 20 Zahlen:<br>"+beobachtung.join(", ")+
"<br><br>Offene Finale:<br>"+offeneFinale.join(", ")+
"<br><br>Gespielte 12 Zahlen:<br>"+spielZahlen.join(", ")+
"<br><br>Treffer: "+gesamtTreffer+
"<br>Nicht Treffer: "+gesamtNicht+
"<br>Gesamteinsätze: "+gesamtEinsatz+
"<br>Gewinn: "+gewinn+
"<br><br>DETAILS:<br><pre>"+details+"</pre>");
};

ergebnisDiv.appendChild(blockDiv);

createChart(blockNr,gesamtTreffer,gesamtNicht);

}

}

function openeneNachTreffer(arr,f){
return arr.filter(x=>x!=f);
}

function openModal(text){
document.getElementById("modalText").innerHTML=text;
document.getElementById("modal").style.display="block";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function resetAll(){
document.getElementById("input").value="";
document.getElementById("ergebnis").innerHTML="";
}

function createChart(nr,treffer,nicht){

let canvas=document.createElement("canvas");
canvas.id="chart"+nr;
document.getElementById("ergebnis").appendChild(canvas);

new Chart(canvas,{
type:'bar',
data:{
labels:['Treffer','Nicht Treffer'],
datasets:[{
data:[treffer,nicht]
}]
}
});

}

</script>

</body>
</html>
