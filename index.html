<!doctype html>
<html lang="de"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>FÜR BABA — Minimal Analyse</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  body{font-family:Rockwell, 'Segoe UI', Arial; margin:0; background:#fbfdff; color:#111;}
  header{padding:16px; background:#fff; border-bottom:1px solid #eef2f7;}
  .wrap{max-width:1000px;margin:18px auto;padding:12px;}
  .card{background:#fff;padding:14px;border-radius:8px;box-shadow:0 6px 18px rgba(0,0,0,0.03); margin-bottom:12px;}
  label{display:block;color:#556;}
  select,input,textarea{width:100%;padding:10px;border:1px solid #e6eef8;border-radius:8px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .btn{background:#0b5ed7;color:#fff;padding:10px;border-radius:8px;border:none;cursor:pointer;}
  table{width:100%;border-collapse:collapse;margin-top:8px;}
  th,td{padding:8px;border-bottom:1px solid #f0f3f7;}
</style>
</head><body>
<header><h1>FÜR BABA — Roulette Minimal</h1><div class="small">made by mkderechte</div></header>
<div class="wrap">
  <div class="card">
    <label>Rohdaten eingeben</label>
    <textarea id="raw" placeholder="Zahlen ..."></textarea>
    <label style="margin-top:8px">E Runde1/R2/R3</label>
    <input id="E1" value="1"><input id="E2" value="1" style="margin-top:6px"><input id="E3" value="2" style="margin-top:6px">
    <div style="margin-top:8px;"><button class="btn" id="run">Analysieren</button></div>
  </div>

  <div class="card" id="result"></div>
  <div class="card"><canvas id="chart" style="height:180px"></canvas></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const FINALES={"0":[0],"1":[1,11,21,31],"2":[2,12,22,32],"3":[3,13,23,33],"4":[4,14,24,34],"5":[5,15,25,35],"6":[6,16,26,36],"7":[7,17,27],"8":[8,18,28],"9":[9,19,29]};
document.getElementById('run').onclick = ()=>{
  const raw=document.getElementById('raw').value.match(/\b([0-9]|[12][0-9]|3[0-6])\b/g)?.map(n=>+n)||[];
  if(!raw.length) return alert('Bitte Zahlen');
  const E1=+document.getElementById('E1').value||1,E2=+document.getElementById('E2').value||1,E3=+document.getElementById('E3').value||2;
  const blocks=[]; for(let i=0;i<raw.length;i+=60) blocks.push(raw.slice(i,i+60));
  const analyses = blocks.map(b=> analyzeBlock(b,E1,E2,E3));
  const html = analyses.map((a,i)=>`<h3>Block ${i+1}</h3><div>Versuche:${a.totalAttempts} Treffer:${a.totalHits} NettoE:${a.netE.toFixed(2)}</div>`).join("<hr>");
  document.getElementById('result').innerHTML = html;
  const ctx=document.getElementById('chart').getContext('2d');
  if(window.ch) window.ch.destroy();
  window.ch = new Chart(ctx,{type:'bar',data:{labels:analyses.map((_,i)=>'B'+(i+1)),datasets:[{label:'NettoE',data:analyses.map(a=>a.netE)}]}});
};

function analyzeBlock(blockNumbers, E1,E2,E3){
  // simplified but follows the same rules (see other variants)
  let obsEnd=Math.min(20, blockNumbers.length); let observed=new Set(blockNumbers.slice(0,obsEnd)); const computeOpen=obs=>{const m={}; for(let f in FINALES){let fell=0; FINALES[f].forEach(n=>{if(obs.has(n)) fell++}); m[f]=FINALES[f].length-fell} return m};
  let open=computeOpen(observed); while(true){ const eligible=Object.keys(open).filter(f=>f!=='0'&&open[f]>=3); if(eligible.length>=3) break; if(obsEnd>=blockNumbers.length) break; const add=Math.min(12, blockNumbers.length-obsEnd); for(let i=obsEnd;i<obsEnd+add;i++) observed.add(blockNumbers[i]); obsEnd+=add; open=computeOpen(observed); }
  let candidates=Object.keys(open).filter(f=>f!=='0'&&open[f]>=3).sort((a,b)=>open[b]-open[a]); let sel=candidates.slice(0,5); if(!new Set(blockNumbers.slice(0,Math.min(20,blockNumbers.length))).has(0) && sel.indexOf('0')===-1 && sel.length<5) sel.push('0'); if(sel.length<3) return {selected:sel,obsEnd,rounds:[],totalAttempts:0,totalHits:0,totalSuccessPct:"0",netE:0};
  // rounds...
  let occurred=new Set(observed); let active=sel.slice(); let idx=obsEnd; let totalA=0,totalH=0,net=0; const stakes=[E1,E2,E3];
  for(let r=1;r<=3;r++){
    if(r===1&&active.length<3) break; if((r===2||r===3)&&active.length<2) break;
    const stake=stakes[r-1]; const activeNums=[...new Set([].concat(...active.map(f=>FINALES[f].filter(n=>!occurred.has(n)))))]); if(activeNums.length===0) break;
    const spins=Math.min(12, Math.max(0, blockNumbers.length-idx)); if(spins<=0) break;
    let attempts=0,hits=0,payout=0,stakeSpent=0, finaleHits={}; active.forEach(f=>finaleHits[f]=0);
    for(let s=0;s<spins;s++){ const val=blockNumbers[idx+s]; stakeSpent+=activeNums.length*stake; attempts+=activeNums.length; if(activeNums.includes(val)){ hits++; payout+=36*stake; for(const f of active){ if(FINALES[f].includes(val)){ finaleHits[f]++; break;} } } occurred.add(val); }
    idx+=spins; const netr=payout-stakeSpent; totalA+=attempts; totalH+=hits; net+=netr;
    if(r===1 && hits===0) break;
    active = active.filter(f=>{ const size=FINALES[f].length, h=finaleHits[f]||0; let remove=false; if(size===3 && h>=1) remove=true; if(size===4 && h>=2) remove=true; const remaining=FINALES[f].filter(n=>!occurred.has(n)); if(remaining.length===0) remove=true; return !remove;});
  }
  return {selected:sel,obsEnd,rounds:[],totalAttempts:totalA,totalHits:totalH,totalSuccessPct: totalA?((totalH/totalA)*100).toFixed(2):"0",netE:net};
}
</script>
</html>
