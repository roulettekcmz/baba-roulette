<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>Roulette Analyse</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#f4f6fb;
font-family:Rockwell, serif;
margin:0;
}

header{
background:#111;
color:white;
padding:20px;
text-align:center;
}

header img{
width:180px;
border-radius:10px;
margin-bottom:10px;
}

h1{
margin:5px;
}

.sub{
font-size:14px;
opacity:0.8;
}

.container{
max-width:1400px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
margin-bottom:20px;
}

.controls{
display:flex;
gap:20px;
flex-wrap:wrap;
}

select,input{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#0b5ed7;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

.blocks{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:15px;
}

.block{
background:white;
border-radius:8px;
padding:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
cursor:pointer;
}

.win{color:green;font-weight:bold;}
.loss{color:red;font-weight:bold;}

canvas{
max-height:220px;
}

</style>
</head>

<body>

<header>

<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/78/Roulette.jpg/640px-Roulette.jpg">

<h1>Roulette Analyse</h1>

<div class="sub">Für Baba</div>
<div class="sub">made by mkderechte</div>

</header>

<div class="container">

<div class="card">

<h3>Einsatz Einstellungen</h3>

<div class="controls">

<div>
Runde 1 Einsatz  
<input id="stake1" type="number" value="1">
</div>

<div>
Runde 2 Einsatz  
<input id="stake2" type="number" value="1">
</div>

<div>
Runde 3 Einsatz  
<input id="stake3" type="number" value="2">
</div>

<button onclick="run()">Analyse starten</button>

</div>

</div>

<div class="card">

<h3>Gewinn / Verlust pro Block</h3>

<canvas id="profitChart"></canvas>

</div>

<div class="card">

<h3>Block Übersicht</h3>

<div id="blocks" class="blocks"></div>

</div>

</div>

<script>

const FINALES={
0:[0],
1:[1,11,21,31],
2:[2,12,22,32],
3:[3,13,23,33],
4:[4,14,24,34],
5:[5,15,25,35],
6:[6,16,26,36],
7:[7,17,27],
8:[8,18,28],
9:[9,19,29]
}

function run(){

let numbers=prompt("Zahlen eingeben getrennt mit Leerzeichen")

if(!numbers)return

numbers=numbers.split(" ").map(Number)

let blocks=[]

for(let i=0;i<numbers.length;i+=60){
blocks.push(numbers.slice(i,i+60))
}

let profits=[]

document.getElementById("blocks").innerHTML=""

blocks.forEach((block,i)=>{

let result=analyze(block)

profits.push(result.net)

let div=document.createElement("div")
div.className="block"

div.innerHTML=`
<h4>Block ${i+1}</h4>
Finales: ${result.finales.join(",")}

<br><br>

Versuche: ${result.attempts}<br>
Treffer: ${result.hits}<br>
Treffer %: ${result.percent}%<br>

<div class="${result.net>=0?'win':'loss'}">
Netto: ${result.net} E
</div>
`

document.getElementById("blocks").appendChild(div)

})

drawChart(profits)

}

function analyze(block){

let stake1=parseFloat(document.getElementById("stake1").value)
let stake2=parseFloat(document.getElementById("stake2").value)
let stake3=parseFloat(document.getElementById("stake3").value)

let stakes=[stake1,stake2,stake3]

let attempts=0
let hits=0
let net=0

let finales=["1","2","3"]

for(let r=0;r<3;r++){

let stake=stakes[r]

for(let i=0;i<12;i++){

let spin=block[i]

attempts+=finales.length

if(finales.includes(String(spin%10))){
hits++
net+=36*stake
}

net-=stake*finales.length

}

}

let percent=((hits/attempts)*100).toFixed(2)

return{
attempts,
hits,
percent,
net,
finales
}

}

function drawChart(data){

new Chart(document.getElementById("profitChart"),{

type:"bar",

data:{
labels:data.map((_,i)=>"Block "+(i+1)),
datasets:[{
label:"Gewinn / Verlust (E)",
data:data
}]
}

})

}

</script>

</body>
</html>
